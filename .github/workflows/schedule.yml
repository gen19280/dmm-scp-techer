name: DMM英会話 予約状況確認

on:
    schedule:
        # 5分ごとに実行
        - cron: "*/5 * * * *"

    # 手動トリガー用
    workflow_dispatch:

jobs:
    check-reservation:
        runs-on: ubuntu-latest

        steps:
            - name: リポジトリをチェックアウト
              uses: actions/checkout@v4

            - name: Python をセットアップ
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: 依存関係をインストール
              run: |
                  python -m pip install --upgrade pip
                  pip install requests beautifulsoup4 python-dotenv

            - name: 予約状況をチェック
              env:
                  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
                  PYTHONPATH: ${{ github.workspace }}/src/dmm-scp-techer
              run: |
                  python -c "from scraper import main; main()"

            - name: 失敗時の通知
              if: failure()
              env:
                  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
              run: |
                  curl -X POST -H 'Content-type: application/json' \
                    --data '{"content":"❌ DMM英会話予約状況確認スクリプトが失敗しました"}' \
                    "$DISCORD_WEBHOOK_URL"
