name: Update Data

on:
    schedule:
        - cron: "*/10 * * * *" # 10分おき
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "data-update"
    cancel-in-progress: false

jobs:
    update:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.9"

            - name: Install Python dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -e .

            - name: Run scraper
              env:
                  PYTHONPATH: ${{ github.workspace }}/src/dmm-scp-techer
              run: |
                  python -c "from scraper import main; main()"

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install frontend dependencies
              run: |
                  cd frontend
                  npm ci

            - name: Build frontend
              run: |
                  cd frontend
                  npm run build

            - name: Setup Pages
              uses: actions/configure-pages@v4

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: "./frontend/dist"

    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        needs: update
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
